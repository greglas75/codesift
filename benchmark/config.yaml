# =============================================================================
# CodeSift Benchmark Framework — config.yaml
# =============================================================================
# One config to rule them all. Repos, adapters, metrics, limits.
#
# Usage:
#   python scripts/run_benchmark.py --config config.yaml
#   python scripts/run_benchmark.py --repo codesift-mcp --adapter codesift
#   python scripts/run_benchmark.py --adapter codesift,ripgrep --task-filter category=text
# =============================================================================

